<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTL Leonding – Dein System</title>
  <link rel="stylesheet" href="kiosk2.css" />
</head>
<body>
  <div class="ds-root">
    <header class="ds-header">
      <span class="ds-title">DEIN SYSTEM</span>
      <div class="ds-nav">
        <button class="ds-nav-btn" id="navPrev">&#8249;</button>
        <span class="ds-date" id="navDate">Heute</span>
        <button class="ds-nav-btn" id="navNext" disabled>&#8250;</button>
      </div>
      <div class="ds-header-right">
        <span id="dsClock">--</span>
        <span class="ds-sep">&middot;</span>
        <span id="dsUpdated">Updated: --</span>
      </div>
    </header>

    <div class="ds-stats">
      <div class="ds-stat">
        <span class="ds-stat-pill" style="--c:#a78bfa"></span>
        <div class="ds-stat-body">
          <span class="ds-stat-label">Produktion</span>
          <span class="ds-stat-val" id="statProduktion">-- kW</span>
        </div>
      </div>
      <div class="ds-stat">
        <span class="ds-stat-pill" style="--c:#0ea5e9"></span>
        <div class="ds-stat-body">
          <span class="ds-stat-label">Verbrauch</span>
          <span class="ds-stat-val" id="statVerbrauch">-- kW</span>
        </div>
      </div>
      <div class="ds-stat">
        <span class="ds-stat-pill" style="--c:#f59e0b"></span>
        <div class="ds-stat-body">
          <span class="ds-stat-label">Ins Netz</span>
          <span class="ds-stat-val" id="statInsNetz">-- kW</span>
        </div>
      </div>
      <div class="ds-stat">
        <span class="ds-stat-pill" style="--c:#0ea5e9"></span>
        <div class="ds-stat-body">
          <span class="ds-stat-label">Vom Netz</span>
          <span class="ds-stat-val" id="statVomNetz">-- kW</span>
        </div>
      </div>
      <div class="ds-stat">
        <span class="ds-stat-pill" style="--c:#22c55e"></span>
        <div class="ds-stat-body">
          <span class="ds-stat-label">Direktverbrauch</span>
          <span class="ds-stat-val" id="statDirekt">-- kW</span>
        </div>
      </div>
    </div>

    <div class="ds-chart-wrap">
      <canvas id="dsChart"></canvas>
    </div>
  </div>

  <script src="https://unpkg.com/chart.js@4.4.1/dist/chart.umd.js"></script>
  <script src="kiosk2.js" type="module"></script>
</body>
</html>
