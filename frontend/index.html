<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>3D Building Explorer</title>
		<style>
			.vm-badge {
				position: fixed;
				top: 20px;
				right: 20px;
				z-index: 1000;
				background: rgba(46, 204, 113, 0.2); /* Dezent grüner Schimmer */
				color: #2ecc71;
				padding: 8px 15px;
				border-radius: 20px;
				backdrop-filter: blur(10px);
				border: 1px solid rgba(46, 204, 113, 0.3);
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 1.5px;
				text-transform: uppercase;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.vm-badge::before {
				content: "";
				width: 8px;
				height: 8px;
				background: #2ecc71;
				border-radius: 50%;
				display: inline-block;
				box-shadow: 0 0 8px #2ecc71;
				animation: pulse-green 2s infinite;
			}
			@keyframes pulse-green {
				0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
				70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
				100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
			}

			body {
				margin: 0;
				overflow: hidden;
				background: #111;
				font-family: sans-serif;
			}

			/* Room Info Panel */
			#room-info {
				position: fixed;
				top: 70px; /* Below vm-badge */
				right: 20px;
				padding: 15px;
				background: rgba(255, 255, 255, 0.9);
				color: #333;
				border-radius: 12px;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				font-size: 14px;
				z-index: 1000;
				border: 1px solid rgba(255, 255, 255, 0.2);
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
				backdrop-filter: blur(10px);
				min-width: 180px;
			}

			@media (max-width: 600px) {
				#room-info {
					top: auto;
					bottom: 130px;
					left: 50%;
					right: auto;
					transform: translateX(-50%);
					width: calc(100% - 40px);
					max-width: 340px;
				}

				.vm-badge {
					top: 10px;
					right: 10px;
					padding: 6px 12px;
					font-size: 10px;
				}
			}

/* === Nav System Panel === */
#nav-system {
	position: absolute;
	top: 80px;
	right: 20px;
	background: rgba(0, 0, 0, 0.82);
	padding: 15px;
	border-radius: 8px;
	color: white;
	z-index: 1000;
	display: flex;
	flex-direction: column;
	gap: 10px;
	font-family: sans-serif;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
	width: 360px; /* Further increased width to accommodate new button */
	backdrop-filter: blur(12px);
	border: 1px solid rgba(255, 255, 255, 0.08);
}

			#nav-system h3 {
				margin: 0;
				font-size: 16px;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			/* Nav toggle button inside model-controls bar (mobile only) */
			.nav-inline-btn {
				display: none;
			}

			/* Overlay backdrop */
			.nav-overlay {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.55);
				z-index: 999;
				backdrop-filter: blur(3px);
				-webkit-backdrop-filter: blur(3px);
				transition: opacity 0.25s ease;
			}

			.nav-overlay.open {
				display: block;
			}

			/* Mobile bottom-drawer layout */
			@media (max-width: 768px) {
				.nav-inline-btn {
					display: block;
				}

				#nav-system {
					position: fixed;
					top: auto;
					right: 0;
					bottom: 0;
					left: 0;
					width: 100%;
					border-radius: 22px 22px 0 0;
					padding: 0 20px 32px;
					padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
					transform: translateY(105%);
					transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
					z-index: 1001;
					max-height: 72vh;
					overflow-y: auto;
					box-sizing: border-box;
					background: rgba(14, 16, 20, 0.97);
					border: 1px solid rgba(255, 255, 255, 0.1);
					border-bottom: none;
					box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.7);
				}

				/* Drag handle */
				#nav-system::before {
					content: '';
					display: block;
					width: 38px;
					height: 4px;
					background: rgba(255, 255, 255, 0.25);
					border-radius: 2px;
					margin: 14px auto 16px;
					flex-shrink: 0;
				}

				#nav-system.open {
					transform: translateY(0);
				}

				#nav-system h3 {
					font-size: 13px;
					letter-spacing: 2px;
					color: rgba(255, 255, 255, 0.6);
					margin-bottom: 4px;
				}

				#nav-system input[type="text"] {
					font-size: 16px !important; /* prevents iOS auto-zoom */
				}

				#nav-btn {
					padding: 0 20px !important;
					min-height: 44px;
					font-size: 14px !important;
					border-radius: 8px !important;
				}
			}

		#loading {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background-color: #1a1c20;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 9999;
				color: white;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				letter-spacing: 4px;
				transition: opacity 0.5s ease;
			}

			.loading-text {
				font-size: 24px;
				font-weight: 300;
				text-transform: uppercase;
				margin-bottom: 20px;
				animation: pulse 2s infinite ease-in-out;
			}

			.loading-bar-container {
				width: 250px;
				height: 3px;
				background: rgba(255, 255, 255, 0.05);
				position: relative;
				overflow: hidden;
				border-radius: 4px;
			}

			.loading-bar-progress {
				width: 40%;
				height: 100%;
				position: absolute;
				background: linear-gradient(
						90deg,
						rgba(255,255,255,0) 0%,
						rgba(255,255,255,0.8) 50%,
						rgba(255,255,255,0) 100%
				);
				animation: smooth-sweep 1.8s infinite linear;
			}

			@keyframes smooth-sweep {
				0% { transform: translateX(-150%); }
				100% { transform: translateX(250%); }
			}

			@keyframes pulse {
				0%, 100% { opacity: 0.6; }
				50% { opacity: 1; }
			}
		</style>
	</head>
	<body>

	<div id="loading">
		<div class="loading-text">Loading Assets</div>
		<div class="loading-bar-container">
			<div class="loading-bar-progress"></div>
		</div>
	</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module" src="logic.js" defer></script>

	<script>
		function toggleNavPanel() {
			const panel = document.getElementById('nav-system');
			const overlay = document.getElementById('nav-overlay');
			const btn = document.getElementById('nav-toggle-btn');
			const isOpen = panel.classList.contains('open');
			if (isOpen) {
				panel.classList.remove('open');
				overlay.classList.remove('open');
				if (btn) btn.textContent = '🧭';
			} else {
				panel.classList.add('open');
				overlay.classList.add('open');
				if (btn) btn.textContent = '✕';
				setTimeout(() => document.getElementById('room-search').focus(), 380);
			}
		}

		function closeNavPanel() {
			const panel = document.getElementById('nav-system');
			const overlay = document.getElementById('nav-overlay');
			const btn = document.getElementById('nav-toggle-btn');
			if (panel) panel.classList.remove('open');
			if (overlay) overlay.classList.remove('open');
			if (btn) btn.textContent = '🧭';
		}
	</script>

		<style>
			.model-controls {
				position: fixed;
				bottom: 30px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 999;
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 8px;
				background: rgba(255, 255, 255, 0.05);
				padding: 10px;
				border-radius: 25px;
				backdrop-filter: blur(10px);
				box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
				width: 50%;
				max-width: calc(100% - 40px);
			}

			.model-controls button {
				background: rgba(255, 255, 255, 0.1);
				color: white;
				border: none;
				padding: 8px 14px;
				border-radius: 20px;
				cursor: pointer;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				font-size: 12px;
				font-weight: 500;
				transition: all 0.2s ease;
				text-transform: uppercase;
				letter-spacing: 1px;
				white-space: nowrap;
				touch-action: manipulation;
				-webkit-tap-highlight-color: transparent;
			}

			@media (max-width: 768px) {
				.model-controls {
					bottom: 20px;
					left: 50%;
					transform: translateX(-50%);
					padding: 7px 10px;
					border-radius: 18px;
					gap: 5px;
					max-width: calc(100% - 24px);
				}

				.model-controls button {
					padding: 8px 12px;
					font-size: 11px;
					min-height: 36px;
					touch-action: manipulation;
					-webkit-tap-highlight-color: transparent;
				}
			}

			@media (max-width: 480px) {
				.model-controls {
					bottom: 16px;
					padding: 6px 8px;
					border-radius: 14px;
					gap: 4px;
					max-width: calc(100% - 16px);
				}

				.model-controls button {
					padding: 7px 10px;
					font-size: 10px;
					min-height: 34px;
				}
			}

			.model-controls button:hover {
				background: rgba(255, 255, 255, 0.2);
				transform: translateY(-2px);
			}

.model-controls button:active {
    transform: translateY(0);
}

/* Swipe effect removed - using camera animation instead */

			.model-controls button.reset-btn {
				background: #e74c3c;
				color: white;
			}

			.model-controls button.reset-btn:hover {
				background: #ff5e4d;
				box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
			}
			.model-controls button.active {
				background: rgba(255, 255, 255, 0.4); /* Brighter background */
				box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
				color: #fff;
				outline: 1px solid rgba(255, 255, 255, 0.5);
			}

			/* Heatmap button states */
			#heatMapButton.heatmap-active {
				background: #e67e22;
				color: #fff;
				outline: 1px solid rgba(255, 255, 255, 0.2);
			}
			#heatMapButton.heatmap-active:hover {
				background: #f39c12;
				transform: translateY(-2px);
			}
			#heatMapButton.co2-active {
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.35);
				outline: 1px solid rgba(255, 255, 255, 0.08);
				cursor: not-allowed;
			}
			#co2HeatmapButton.co2-active {
				background: #27ae60;
				color: #fff;
				outline: 1px solid rgba(255, 255, 255, 0.2);
			}
			#co2HeatmapButton.co2-active:hover {
				background: #2ecc71;
				transform: translateY(-2px);
			}
			#co2HeatmapButton.heatmap-active {
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.35);
				outline: 1px solid rgba(255, 255, 255, 0.08);
				cursor: not-allowed;
			}
			/* Disabled state for full building view */
			#heatMapButton:disabled,
			#co2HeatmapButton:disabled {
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.35);
				outline: 1px solid rgba(255, 255, 255, 0.08);
				cursor: not-allowed;
				box-shadow: none;
				transform: none;
				filter: grayscale(0.9);
			}
		</style>

		<div class="vm-badge">running on vm 23</div>

		<div class="nav-overlay" id="nav-overlay" onclick="closeNavPanel()"></div>

		<div id="nav-system">
			<h3>Navigation</h3>
			<div style="display: flex; gap: 8px; position: relative;">
				<div style="position: relative; flex-grow: 1;">
					<input type="text" id="room-search" placeholder="Search room (e.g. 105)..." autocomplete="off" style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 14px;">
					<div id="search-suggestions" style="position: absolute; top: 100%; left: 0; right: 0; background: #2a2d31; border-radius: 4px; overflow: hidden; display: none; z-index: 1001; max-height: 200px; overflow-y: auto; margin-top: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);"></div>
				</div>
				<button onclick="window.startNavigation(document.getElementById('room-search').value); closeNavPanel();" id="nav-btn" style="padding: 0 15px; background: #2ecc71; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase;">GO</button>
			</div>
		</div>

<div class="model-controls" id="button-container">
    <button class="nav-inline-btn" onclick="toggleNavPanel()" id="nav-toggle-btn" aria-label="Open navigation">🧭</button>
    <button onclick="handleButtonClick(this, 'ModelU.gltf')">Basement</button>
    <button onclick="handleButtonClick(this, 'ModelE.gltf')">Ground</button>
    <button onclick="handleButtonClick(this, 'Model1F.gltf')">Floor&nbsp;1</button>
    <button onclick="handleButtonClick(this, 'Model2F.gltf')">Floor&nbsp;2</button>
    <button onclick="handleButtonClick(this, 'ModelT.gltf')">Gym</button>
    <button onclick="handleButtonClick(this, 'ModelFull.gltf')" class="reset-btn">Reset View</button>
    <button onclick="updateBuildingHeatmap()" id="heatMapButton">Temperature</button>
    <button onclick="updateCO2Heatmap()" id="co2HeatmapButton">CO2</button>
</div>
	</body>
</html>
