<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>3D Building Explorer</title>
		<style>
			body {
				margin: 0;
				overflow: hidden;
				background: #111;
				font-family: sans-serif;
			}
			#ui {
				position: absolute;
				top: 20px;
				left: 20px;
				color: white;
				background: rgba(0, 0, 0, 0.7);
				padding: 15px;
				border-radius: 8px;
				pointer-events: none;
			}
			#controls {
				position: absolute;
				bottom: 20px;
				left: 20px;
			}
			button {
				padding: 10px 20px;
				cursor: pointer;
				background: #007bff;
				color: white;
				border: none;
				border-radius: 5px;
			}
			button:hover {
				background: #0056b3;
			}

			 #loading {
				 position: fixed;
				 top: 0;
				 left: 0;
				 width: 100vw;
				 height: 100vh;
				 background-color: #1a1c20; /* Matches the dark grey theme */
				 display: flex;
				 flex-direction: column;
				 justify-content: center;
				 align-items: center;
				 z-index: 9999; /* Ensure it's above everything */
				 color: white;
				 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				 letter-spacing: 4px;
				 transition: opacity 0.5s ease; /* Smooth fade out */
			 }

			.loading-text {
				font-size: 24px;
				font-weight: 300;
				text-transform: uppercase;
				margin-bottom: 20px;
				animation: pulse 2s infinite ease-in-out;
			}

			/* The track */
			.loading-bar-container {
				width: 250px;
				height: 3px;
				background: rgba(255, 255, 255, 0.05); /* Very subtle track */
				position: relative;
				overflow: hidden;
				border-radius: 4px;
			}

			/* The animated highlight */
			.loading-bar-progress {
				width: 40%; /* Length of the "glow" */
				height: 100%;
				position: absolute;
				background: linear-gradient(
						90deg,
						rgba(255,255,255,0) 0%,
						rgba(255,255,255,0.8) 50%,
						rgba(255,255,255,0) 100%
				);
				animation: smooth-sweep 1.8s infinite linear;
			}

			@keyframes smooth-sweep {
				0% {
					transform: translateX(-150%);
				}
				100% {
					transform: translateX(250%);
				}
			}
		</style>


		</style>
	</head>
	<body>

	<div id="loading">
		<div class="loading-text">Loading Assets</div>
		<div class="loading-bar-container">
			<div class="loading-bar-progress"></div>
		</div>
	</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module" src="logic.js" defer></script>
		<script src="click.js" defer></script>

		<style>
			.model-controls {
				position: fixed;
				bottom: 30px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 999;
				display: flex;
				gap: 12px;
				background: rgba(255, 255, 255, 0.05);
				padding: 10px 20px;
				border-radius: 50px;
				backdrop-filter: blur(10px);
				border: 1px solid rgba(255, 255, 255, 0.1);
				box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
			}

			.model-controls button {
				background: rgba(255, 255, 255, 0.1);
				color: white;
				border: none;
				padding: 10px 18px;
				border-radius: 25px;
				cursor: pointer;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				font-size: 13px;
				font-weight: 500;
				transition: all 0.2s ease;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			.model-controls button:hover {
				background: rgba(255, 255, 255, 0.2);
				transform: translateY(-2px);
			}

			.model-controls button:active {
				transform: translateY(0);
			}

			.model-controls button.reset-btn {
				background: #e74c3c;
				color: white;
			}

			.model-controls button.reset-btn:hover {
				background: #ff5e4d;
				box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
			}
			.model-controls button.active {
				background: rgba(255, 255, 255, 0.4); /* Brighter background */
				box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
				color: #fff;
				border: 1px solid rgba(255, 255, 255, 0.5);
			}
		</style>

		<div class="model-controls" id="button-container">
			<button onclick="handleButtonClick(this, 'ModelBasement.gltf')">Basement</button>
			<button onclick="handleButtonClick(this, 'ModelE.gltf')">Ground</button>
			<button onclick="handleButtonClick(this, 'Model1F.gltf')">Floor 1</button>
			<button onclick="handleButtonClick(this, 'Model2F.gltf')">Floor 2</button>
			<button onclick="handleButtonClick(this, 'ModelFull.gltf')" class="reset-btn">Reset View</button>
		</div>
	</body>
</html>
