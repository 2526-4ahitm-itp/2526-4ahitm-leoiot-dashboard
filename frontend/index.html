<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>3D Building Explorer</title>
		<style>

.vm-badge {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: rgba(46, 204, 113, 0.2); /* Dezent grüner Schimmer */
    color: #2ecc71;
    padding: 8px 15px;
   border-radius: 20px;
   backdrop-filter: blur(10px);
   border: 1px solid rgba(46, 204, 113, 0.3);
   font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
   font-size: 11px;
   font-weight: 600;
   letter-spacing: 1.5px;
   text-transform: uppercase;
   box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
   display: flex;
   align-items: center;
   gap: 8px;
   }
   .vm-badge::before {
   content: "";
   width: 8px;
   height: 8px;
   background: #2ecc71;
   border-radius: 50%;
   display: inline-block;
   box-shadow: 0 0 8px #2ecc71;
   animation: pulse-green 2s infinite;
   }
   @keyframes pulse-green {
   0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
   70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
   100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
}

			body {
				margin: 0;
				overflow: hidden;
				background: #111;
				font-family: sans-serif;
			}
			#ui {
				position: absolute;
				top: 20px;
				left: 20px;
				color: white;
				background: rgba(0, 0, 0, 0.7);
				padding: 15px;
				border-radius: 8px;
				pointer-events: none;
			}
			#controls {
				position: absolute;
				bottom: 20px;
				left: 20px;
			}
			button {
				padding: 10px 20px;
				cursor: pointer;
				background: #007bff;
				color: white;
				border: none;
				border-radius: 5px;
			}
			button:hover {
				background: #0056b3;
			}

			 #loading {
				 position: fixed;
				 top: 0;
				 left: 0;
				 width: 100vw;
				 height: 100vh;
				 background-color: #1a1c20; /* Matches the dark grey theme */
				 display: flex;
				 flex-direction: column;
				 justify-content: center;
				 align-items: center;
				 z-index: 9999; /* Ensure it's above everything */
				 color: white;
				 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				 letter-spacing: 4px;
				 transition: opacity 0.5s ease; /* Smooth fade out */
			 }

			.loading-text {
				font-size: 24px;
				font-weight: 300;
				text-transform: uppercase;
				margin-bottom: 20px;
				animation: pulse 2s infinite ease-in-out;
			}

			/* The track */
			.loading-bar-container {
				width: 250px;
				height: 3px;
				background: rgba(255, 255, 255, 0.05); /* Very subtle track */
				position: relative;
				overflow: hidden;
				border-radius: 4px;
			}

			/* The animated highlight */
			.loading-bar-progress {
				width: 40%; /* Length of the "glow" */
				height: 100%;
				position: absolute;
				background: linear-gradient(
						90deg,
						rgba(255,255,255,0) 0%,
						rgba(255,255,255,0.8) 50%,
						rgba(255,255,255,0) 100%
				);
				animation: smooth-sweep 1.8s infinite linear;
			}

			@keyframes smooth-sweep {
				0% {
					transform: translateX(-150%);
				}
				100% {
					transform: translateX(250%);
				}
			}
		</style>
	</head>
	<body>

	<div id="loading">
		<div class="loading-text">Loading Assets</div>
		<div class="loading-bar-container">
			<div class="loading-bar-progress"></div>
		</div>
	</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module" src="logic.js" defer></script>

		<style>
			.model-controls {
				position: fixed;
				bottom: 30px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 999;
				display: flex;
				gap: 12px;
				background: rgba(255, 255, 255, 0.05);
				padding: 10px 20px;
				border-radius: 50px;
				backdrop-filter: blur(10px);
				box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
			}

			.model-controls button {
				background: rgba(255, 255, 255, 0.1);
				color: white;
				border: none;
				padding: 10px 18px;
				border-radius: 25px;
				cursor: pointer;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				font-size: 13px;
				font-weight: 500;
				transition: all 0.2s ease;
				text-transform: uppercase;
				letter-spacing: 1px;
				white-space: nowrap;
			}

			.model-controls button:hover {
				background: rgba(255, 255, 255, 0.2);
				transform: translateY(-2px);
			}

			.model-controls button:active {
				transform: translateY(0);
			}

			.model-controls button.reset-btn {
				background: #e74c3c;
				color: white;
			}

			.model-controls button.reset-btn:hover {
				background: #ff5e4d;
				box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
			}
			.model-controls button.active {
				background: rgba(255, 255, 255, 0.4); /* Brighter background */
				box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
				color: #fff;
				outline: 1px solid rgba(255, 255, 255, 0.5);
			}

			/* Heatmap button states */
			#heatMapButton.heatmap-active {
				background: #e67e22;
				color: #fff;
				outline: 1px solid rgba(255, 255, 255, 0.2);
			}
			#heatMapButton.heatmap-active:hover {
				background: #f39c12;
				transform: translateY(-2px);
			}
			#heatMapButton.co2-active {
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.35);
				outline: 1px solid rgba(255, 255, 255, 0.08);
				cursor: not-allowed;
			}
			#co2HeatmapButton.co2-active {
				background: #27ae60;
				color: #fff;
				outline: 1px solid rgba(255, 255, 255, 0.2);
			}
			#co2HeatmapButton.co2-active:hover {
				background: #2ecc71;
				transform: translateY(-2px);
			}
			#co2HeatmapButton.heatmap-active {
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.35);
				outline: 1px solid rgba(255, 255, 255, 0.08);
				cursor: not-allowed;
			}
			/* Disabled state for full building view */
			#heatMapButton:disabled,
			#co2HeatmapButton:disabled {
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.35);
				outline: 1px solid rgba(255, 255, 255, 0.08);
				cursor: not-allowed;
				box-shadow: none;
				transform: none;
				filter: grayscale(0.9);
			}
		</style>

		<div class="vm-badge">running on vm 23</div>

		<div id="nav-system" style="position: absolute; top: 80px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; color: white; z-index: 1000; display: flex; flex-direction: column; gap: 10px; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px;">
			<h3 style="margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;">Navigation</h3>
			<div style="display: flex; gap: 8px; position: relative;">
				<div style="position: relative; flex-grow: 1;">
					<input type="text" id="room-search" placeholder="Search room (e.g. 105)..." autocomplete="off" style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 14px;">
					<div id="search-suggestions" style="position: absolute; top: 100%; left: 0; right: 0; background: #2a2d31; border-radius: 4px; overflow: hidden; display: none; z-index: 1001; max-height: 200px; overflow-y: auto; margin-top: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);"></div>
				</div>
				<button onclick="window.startNavigation(document.getElementById('room-search').value)" id="nav-btn" style="padding: 0 15px; background: #2ecc71; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase;">GO</button>
			</div>
		</div>

		<div class="model-controls" id="button-container">
			<button onclick="handleButtonClick(this, 'ModelU.gltf')">Basement</button>
			<button onclick="handleButtonClick(this, 'ModelE.gltf')">Ground</button>
			<button onclick="handleButtonClick(this, 'Model1F.gltf')">Floor&nbsp;1</button>
			<button onclick="handleButtonClick(this, 'Model2F.gltf')">Floor&nbsp;2</button>
			<button onclick="handleButtonClick(this, 'ModelFull.gltf')" class="reset-btn">Reset View</button>
			<button onclick="updateBuildingHeatmap()" id="heatMapButton">Temperature</button>
			<button onclick="updateCO2Heatmap()" id="co2HeatmapButton">CO2</button>
		</div>
	</body>
</html>
