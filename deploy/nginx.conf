server {
    server_name vm23.htl-leonding.ac.at;

    # 1. Das Dashboard-v2 (Muss VOR der Hauptseite stehen!)
    location /dashboard/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. InfluxDB Proxy
    location /influx/ {
        proxy_pass http://127.0.0.1:8086/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. WebSocket Proxy
    location /ws {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 4. Haupt-Frontend (3D View)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vm23.htl-leonding.ac.at/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vm23.htl-leonding.ac.at/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = vm23.htl-leonding.ac.at) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name vm23.htl-leonding.ac.at;
    return 404; # managed by Certbot


}