server {
    listen 80;
    server_name vm23.htl-leonding.ac.at;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vm23.htl-leonding.ac.at;

    ssl_certificate /etc/letsencrypt/live/vm23.htl-leonding.ac.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vm23.htl-leonding.ac.at/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 1. Grafana Proxy (JETZT MIT PROTO-HEADER)
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # <--- DAS IST DER FIX!
    }

    # (Die anderen Locations wie vorhin...)
    location /dashboard/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
    }

    location /influx/ {
        proxy_pass http://127.0.0.1:8086/;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
