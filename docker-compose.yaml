services:
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - ./config:/mosquitto/config
    networks:
      - leoiot

  influxdb:
    container_name: influxdb
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=leogreen
      - DOCKER_INFLUXDB_INIT_ORG=leoiot
      - DOCKER_INFLUXDB_INIT_BUCKET=server_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=ih3lGQ2dVqXG7ec0Ai-flUi5ZWTqp3AChtwI0fu4014-cn5h0MRE6-RcWtlL1yYGUaaSg6NOtcW_TEjQdGGA5A==
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - leoiot

  telegraf:
    image: telegraf:latest
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - leoiot

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    depends_on:
      - influxdb
    networks:
      - leoiot

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    networks:
      - leoiot
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SERVER_ROOT_URL=https://vm23.htl-leonding.ac.at/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_PROTOCOL=http


  quarkus-app:
    build:
      context: ./backend/sensor-data-generator
      dockerfile: src/main/docker/Dockerfile
    environment:
      - MQTT_HOST=mosquitto
    depends_on:
      - mosquitto
    networks:
      - leoiot

  dashboard-v2:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard-v2:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "8081:8081"
    depends_on:
      - influxdb
    networks:
      - leoiot

  fake-sensors:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./fake-sensors:/app
    command: sh -c "npm install && node index.js"
    environment:
      - MQTT_HOST=mosquitto
    depends_on:
      - mosquitto
    networks:
      - leoiot

  mqtt-ws-bridge:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mqtt-ws-bridge:/app
    command: sh -c "npm install && npm start"
    environment:
      - MQTT_HOST=mosquitto
      - WS_PORT=8090
    ports:
      - "8090:8090"
    depends_on:
      - mosquitto
    networks:
      - leoiot

  kiosk:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./kiosk:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "8082:8082"
    depends_on:
      - influxdb
    networks:
      - leoiot

  solax-collector:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./solax-collector:/app
    command: sh -c "npm install && node index.js"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=ih3lGQ2dVqXG7ec0Ai-flUi5ZWTqp3AChtwI0fu4014-cn5h0MRE6-RcWtlL1yYGUaaSg6NOtcW_TEjQdGGA5A==
      - INFLUX_ORG=leoiot
      - INFLUX_BUCKET=server_data
    depends_on:
      - influxdb
    networks:
      - leoiot

networks:
  leoiot:
    driver: bridge

volumes:
  mosquitto_data:
  influxdb_data:
